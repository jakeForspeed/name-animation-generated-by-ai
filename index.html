<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Name Galaxy Fixed</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle at center, #020617, #000);
  }

  canvas {
    display: block;
  }

  .hint {
    position: absolute;
    bottom: 10px;
    left: 10px;
    color: rgba(255,255,255,0.4);
    font-family: sans-serif;
    font-size: 12px;
  }
</style>
</head>
<body>

<div class="hint">Move mouse • Watch name transform into galaxy ✨</div>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

const text = "Jaynee Jane Velasco";

const mouse = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  radius: 180
};

window.addEventListener("mousemove", e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

class Particle {
  constructor(x, y) {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;

    this.targetX = x;
    this.targetY = y;

    this.baseX = x;
    this.baseY = y;

    this.size = 2;
    this.hue = Math.random() * 360;
  }

  update(time) {

    // galaxy drift
    this.x += Math.sin(time + this.baseY * 0.01) * 0.3;
    this.y += Math.cos(time + this.baseX * 0.01) * 0.3;

    // mouse gravity
    let dx = this.x - mouse.x;
    let dy = this.y - mouse.y;
    let dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < mouse.radius) {
      let force = (mouse.radius - dist) / mouse.radius;
      this.x += dx * force * 0.5;
      this.y += dy * force * 0.5;
    }

    // return to text shape
    this.x += (this.targetX - this.x) * 0.04;
    this.y += (this.targetY - this.y) * 0.04;

    this.hue += 0.5;
  }

  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `hsl(${this.hue},100%,65%)`;
    ctx.fill();
  }
}

let particles = [];

/* ---------------- CREATE TEXT SHAPE ---------------- */
function createTextShape() {

  particles = [];

  let temp = document.createElement("canvas");
  let tctx = temp.getContext("2d");

  temp.width = canvas.width;
  temp.height = canvas.height;

  tctx.fillStyle = "white";
  tctx.font = "bold 70px Arial";
  tctx.textAlign = "center";
  tctx.textBaseline = "middle";

  tctx.fillText(text, canvas.width / 2, canvas.height / 2);

  let data = tctx.getImageData(0, 0, canvas.width, canvas.height);

  for (let y = 0; y < canvas.height; y += 5) {
    for (let x = 0; x < canvas.width; x += 5) {

      let index = (y * canvas.width + x) * 4;

      if (data.data[index + 3] > 128) {
        particles.push(new Particle(x, y));
      }
    }
  }
}

let time = 0;

/* ---------------- ANIMATE ---------------- */
function animate() {

  ctx.fillStyle = "rgba(0,0,0,0.12)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  time += 0.01;

  // soft cosmic glow
  let glow = ctx.createRadialGradient(
    canvas.width/2, canvas.height/2, 50,
    canvas.width/2, canvas.height/2, 600
  );

  glow.addColorStop(0, "rgba(0,255,255,0.05)");
  glow.addColorStop(1, "transparent");

  ctx.fillStyle = glow;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  particles.forEach(p => {
    p.update(time);
    p.draw();
  });

  requestAnimationFrame(animate);
}

/* ---------------- INIT ---------------- */
createTextShape();
animate();

/* ---------------- RESIZE ---------------- */
window.addEventListener("resize", () => {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
  createTextShape();
});
</script>

</body>
</html>
