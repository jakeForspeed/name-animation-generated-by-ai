<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Identity Galaxy Field</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle at center, #020617, #000);
  }

  canvas {
    display: block;
  }

  .hint {
    position: absolute;
    bottom: 10px;
    left: 10px;
    color: rgba(255,255,255,0.4);
    font-family: sans-serif;
    font-size: 12px;
  }
</style>
</head>
<body>

<div class="hint">Move mouse • Explore identity galaxy ✨</div>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

/* ---------------- IDENTITY DATA ---------------- */
const data = [
  "J","A","Y","N","E","E","J","A","N","E","V","E","L","A","S","C","O"
  "October",
  "11",
  "1999",
  "♎",
  "⚖️",
  "1","7","8","10","11","20","21","73",
  "🐶","🐕","🐇","🐰"
];

const colorPalette = [
  "#4DA3FF", // Blue
  "#A0A0A0", // Gray
  "#FFD84D", // Yellow
  "#FFFFFF"  // White
];

/* ---------------- MOUSE FIELD ---------------- */
const mouse = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  radius: 220
};

window.addEventListener("mousemove", e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

/* ---------------- PARTICLE ---------------- */
class Particle {
  constructor(text) {
    this.text = text;

    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;

    this.vx = (Math.random() - 0.5) * 1.2;
    this.vy = (Math.random() - 0.5) * 1.2;

    this.size = Math.random() * 2 + 1;

    this.color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
  }

  update(time) {

    /* floating motion */
    this.x += this.vx + Math.sin(time + this.y * 0.01) * 0.3;
    this.y += this.vy + Math.cos(time + this.x * 0.01) * 0.3;

    /* wrap screen */
    if (this.x < 0) this.x = canvas.width;
    if (this.x > canvas.width) this.x = 0;
    if (this.y < 0) this.y = canvas.height;
    if (this.y > canvas.height) this.y = 0;

    /* mouse gravity */
    let dx = this.x - mouse.x;
    let dy = this.y - mouse.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    if (dist < mouse.radius) {
      let force = (mouse.radius - dist) / mouse.radius;
      this.x += dx * force * 0.7;
      this.y += dy * force * 0.7;
    }
  }

  draw() {
    ctx.fillStyle = this.color;
    ctx.font = `${this.size * 12}px Arial`;
    ctx.fillText(this.text, this.x, this.y);
  }
}

/* ---------------- CREATE FIELD ---------------- */
let particles = [];

function init() {
  particles = [];

  for (let i = 0; i < data.length * 12; i++) {
    particles.push(
      new Particle(data[Math.floor(Math.random() * data.length)])
    );
  }
}

let time = 0;

/* ---------------- ANIMATION ---------------- */
function animate() {

  ctx.fillStyle = "rgba(0,0,0,0.15)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  time += 0.01;

  /* cosmic glow */
  let glow = ctx.createRadialGradient(
    canvas.width/2,
    canvas.height/2,
    0,
    canvas.width/2,
    canvas.height/2,
    700
  );

  glow.addColorStop(0, "rgba(0,255,255,0.05)");
  glow.addColorStop(1, "transparent");

  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.update(time);
    p.draw();
  });

  requestAnimationFrame(animate);
}

/* ---------------- START ---------------- */
init();
animate();

/* ---------------- RESIZE ---------------- */
window.addEventListener("resize", () => {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
  init();
});
</script>

</body>
</html>
