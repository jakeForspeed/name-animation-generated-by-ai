<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Name Galaxy Field</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle at center, #020617, #000);
  }

  canvas {
    display: block;
  }

  .hint {
    position: absolute;
    bottom: 10px;
    left: 10px;
    color: rgba(255,255,255,0.4);
    font-family: sans-serif;
    font-size: 12px;
    user-select: none;
  }
</style>
</head>
<body>

<div class="hint">Move mouse • Watch your name become a galaxy ✨</div>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

const text = "Jaynee Jane Velasco";

/* ---------------- MOUSE FIELD ---------------- */
const mouse = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  radius: 200
};

window.addEventListener("mousemove", e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

/* ---------------- FLOATING NAME PARTICLES ---------------- */
class NameParticle {
  constructor() {
    this.reset();
    this.size = Math.random() * 2 + 1;
    this.hue = Math.random() * 360;
  }

  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;

    this.vx = (Math.random() - 0.5) * 1.2;
    this.vy = (Math.random() - 0.5) * 1.2;

    this.text = text[Math.floor(Math.random() * text.length)];
  }

  update(time) {

    // smooth floating motion
    this.x += this.vx + Math.sin(time + this.y * 0.01) * 0.3;
    this.y += this.vy + Math.cos(time + this.x * 0.01) * 0.3;

    // wrap around screen (infinite space feel)
    if (this.x < 0) this.x = canvas.width;
    if (this.x > canvas.width) this.x = 0;
    if (this.y < 0) this.y = canvas.height;
    if (this.y > canvas.height) this.y = 0;

    // mouse gravity distortion
    let dx = this.x - mouse.x;
    let dy = this.y - mouse.y;
    let dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < mouse.radius) {
      let force = (mouse.radius - dist) / mouse.radius;

      this.x += dx * force * 0.8;
      this.y += dy * force * 0.8;
    }

    this.hue += 0.8;
  }

  draw() {
    ctx.fillStyle = `hsla(${this.hue},100%,70%,0.9)`;
    ctx.font = `${this.size * 10}px Arial`;
    ctx.fillText(this.text, this.x, this.y);
  }
}

/* ---------------- CREATE FIELD ---------------- */
let particles = [];

function init() {
  particles = [];

  for (let i = 0; i < 250; i++) {
    particles.push(new NameParticle());
  }
}

let time = 0;

/* ---------------- ANIMATE ---------------- */
function animate() {

  // soft fade (trail effect)
  ctx.fillStyle = "rgba(0,0,0,0.15)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  time += 0.01;

  // cosmic glow layer
  let glow = ctx.createRadialGradient(
    canvas.width/2,
    canvas.height/2,
    50,
    canvas.width/2,
    canvas.height/2,
    700
  );

  glow.addColorStop(0, "rgba(0,255,255,0.06)");
  glow.addColorStop(1, "transparent");

  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.update(time);
    p.draw();
  });

  requestAnimationFrame(animate);
}

/* ---------------- START ---------------- */
init();
animate();

/* ---------------- RESIZE ---------------- */
window.addEventListener("resize", () => {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
  init();
});
</script>

</body>
</html>
